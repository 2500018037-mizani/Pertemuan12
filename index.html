<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Data Mahasiswa</title>
    <style>
        /* Modern Reset & CSS Variables */
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.25s ease;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Style */
        .judul-wrapper {
            text-align: center;
            margin-bottom: 40px;
        }

        .judul-teks {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Container: Split Layout */
        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        @media (min-width: 768px) {
            .main-container {
                grid-template-columns: 1.2fr 1.8fr;
            }
        }

        /* Modern Glassmorphism Card Style */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Form Controls styling (Tanpa Table!) */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Button Grid */
        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
        }

        .btn-reset:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Right Panel: Output Hasil */
        .hasil-judul {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-count {
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        #daftarData {
            display: grid;
            gap: 15px;
            max-height: 550px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        #daftarData::-webkit-scrollbar {
            width: 6px;
        }
        #daftarData::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        /* Animasi Kartu Mahasiswa Baru */
        .kartu-mahasiswa {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            animation: slideIn 0.3s ease forwards;
            position: relative;
            overflow: hidden;
        }

        .kartu-mahasiswa::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--primary);
        }

        .kartu-mahasiswa:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateX(4px);
        }

        .kartu-mahasiswa .nama {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .kartu-mahasiswa .sub-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .kartu-mahasiswa .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.15);
            padding: 10px 14px;
            border-radius: 6px;
        }

        .kartu-mahasiswa .label {
            color: var(--text-muted);
            display: block;
            font-size: 0.75rem;
            margin-bottom: 2px;
        }

        .kosong {
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
            padding: 40px 0;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="judul-wrapper">
        <h1 class="judul-teks">DASHBOARD MAHASISWA</h1>
    </div>

    <div class="main-container">
        <div class="glass-panel">
            <form id="formMahasiswa">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
                </div>

                <div class="form-group">
                    <label for="nim">NIM</label>
                    <input type="text" id="nim" placeholder="Masukkan NIM" required>
                </div>

                <div class="form-group">
                    <label for="prodi">Program Studi</label>
                    <input type="text" id="prodi" placeholder="Contoh: Teknik Informatika">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" placeholder="nama@kampus.ac.id" required>
                </div>

                <div class="form-group">
                    <label for="alamat">Alamat</label>
                    <textarea id="alamat" rows="3" placeholder="Tuliskan alamat domisili..."></textarea>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-submit">Simpan Data</button>
                    <button type="reset" class="btn-reset">Batal</button>
                </div>
            </form>
        </div>

        <div class="glass-panel">
            <div class="hasil-judul">
                <span>Data Tersimpan</span>
                <span class="badge-count" id="jumlahData">0</span>
            </div>
            
            <div id="daftarData">
                <p class="kosong" id="pesanKosong">Belum ada data mahasiswa yang dimasukkan.</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById("formMahasiswa");
        const daftarData = document.getElementById("daftarData");
        const jumlahData = document.getElementById("jumlahData");

        let dataMahasiswa = [];

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const nama   = document.getElementById("nama").value.trim();
            const nim    = document.getElementById("nim").value.trim();
            const prodi  = document.getElementById("prodi").value.trim();
            const email  = document.getElementById("email").value.trim();
            const alamat = document.getElementById("alamat").value.trim();

            if (nama === "" || nim === "" || email === "") {
                alert("Nama, NIM, dan Email wajib diisi!");
                return;
            }

            const waktu = new Date().toLocaleString("id-ID");
            dataMahasiswa.unshift({ waktu, nama, nim, prodi, email, alamat });

            tampilkanData();
            form.reset();
        });

        function tampilkanData() {
            jumlahData.textContent = dataMahasiswa.length;

            if (dataMahasiswa.length === 0) {
                daftarData.innerHTML = '<p class="kosong">Belum ada data mahasiswa yang dimasukkan.</p>';
                return;
            }

            daftarData.innerHTML = dataMahasiswa.map(function (d) {
                return `
                    <div class="kartu-mahasiswa">
                        <div class="nama">${escapeHtml(d.nama)}</div>
                        <div class="sub-info">NIM: ${escapeHtml(d.nim)} &bull; ${escapeHtml(d.prodi || 'Prodi tidak diisi')}</div>
                        <div class="detail-grid">
                            <div>
                                <span class="label">Email</span>
                                <span>${escapeHtml(d.email)}</span>
                            </div>
                            ${d.alamat ? `
                            <div>
                                <span class="label">Alamat</span>
                                <span>${escapeHtml(d.alamat)}</span>
                            </div>` : ""}
                        </div>
                    </div>
                `;
            }).join("");
        }

        function escapeHtml(teks) {
            const div = document.createElement("div");
            div.textContent = teks;
            return div.innerHTML;
        }
    </script>

</body>
</html>
